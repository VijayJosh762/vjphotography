<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VJ Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Jost', sans-serif;
      color: #f0ece4;
      padding: 56px 24px 72px;
    }

    .logo-wrap {
      position: relative;
      width: 190px;
      height: 190px;
      margin-bottom: 30px;
    }

    .logo-wrap img {
      width: 190px;
      height: 190px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      position: relative;
      z-index: 1;
    }

    .logo-glow {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,80,20,0.4) 0%, transparent 70%);
      z-index: 0;
    }

    .ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.22);
      z-index: 2;
    }

    .ring2 {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.08);
      z-index: 2;
    }

    .brand {
      text-align: center;
      margin-bottom: 8px;
    }

    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 40px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #fff;
    }

    .brand-sub {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: rgba(240,236,228,0.45);
      margin-top: 5px;
    }

    .divider {
      width: 44px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200,80,20,0.75), transparent);
      margin: 24px auto 30px;
    }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 17px;
      color: rgba(240,236,228,0.55);
      text-align: center;
      margin-bottom: 40px;
      letter-spacing: 0.02em;
    }

    .socials {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 340px;
      margin-bottom: 20px;
    }

    .social-row {
      display: flex;
      gap: 14px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      border-radius: 3px;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 14px 18px;
      transition: transform 0.18s, opacity 0.18s;
      cursor: pointer;
      border: none;
      color: #fff;
    }

    .btn:hover { opacity: 0.86; transform: translateY(-2px); }
    .btn:active { transform: scale(0.97); }

    .btn-ig {
      background: linear-gradient(135deg, #833ab4 0%, #fd1d1d 50%, #fcb045 100%);
      flex: 1;
    }

    .btn-fb {
      background: #1877f2;
      flex: 1;
    }

    .btn-yt {
      background: #ff0000;
      flex: 1;
    }

    .btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    .robot-wrap {
      margin-top: 12px;
      width: 100%;
      max-width: 340px;
    }

    .robot-box {
      background: #161616;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 3px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: border-color 0.2s;
      user-select: none;
    }

    .robot-box:hover { border-color: rgba(255,255,255,0.22); }

    .checkbox {
      width: 22px;
      height: 22px;
      border: 1.5px solid rgba(255,255,255,0.3);
      border-radius: 3px;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
    }

    .checkbox.checked {
      background: #c85014;
      border-color: #c85014;
    }

    .checkmark { display: none; }
    .checkbox.checked .checkmark { display: block; }

    .robot-label {
      font-size: 14px;
      color: rgba(240,236,228,0.75);
      letter-spacing: 0.05em;
    }

    .recaptcha-logo {
      margin-left: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
    }

    .recaptcha-logo span {
      font-size: 9px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.04em;
    }

    .rc-icon { width: 32px; height: 32px; opacity: 0.25; }

    .footer-note {
      margin-top: 40px;
      font-size: 11px;
      color: rgba(240,236,228,0.18);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="logo-wrap">
    <div class="logo-glow"></div>
    <div class="ring"></div>
    <div class="ring2"></div>
    <!-- Replace the src below with your actual image path or URL -->
    <img src="Untitled-1.jpg" alt="VJ Photography" />
  </div>

  <div class="brand">
    <div class="brand-name">VJ Photography</div>
    <div class="brand-sub">Visual Storytelling</div>
  </div>

  <div class="divider"></div>

  <div class="tagline">Every frame tells a story worth remembering</div>

  <div class="socials">

    <a class="btn btn-ig" href="https://www.instagram.com/vijay_josh_photography?igsh=cml2OWQ0Z3hsNTRu" onclick="window.location.href='https://www.instagram.com/vijay_josh_photography?igsh=cml2OWQ0Z3hsNTRu'; return false;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor"/>
      </svg>
      Follow on Instagram
    </a>

    <div class="social-row">
      <a class="btn btn-fb" href="https://www.facebook.com/share/1EbDvSCqBR/" onclick="window.location.href='https://www.facebook.com/share/1EbDvSCqBR/'; return false;">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
          <path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/>
        </svg>
        Facebook
      </a>
      <a class="btn btn-yt" href="https://www.youtube.com/@Vjphotography8553" onclick="window.location.href='https://www.youtube.com/@Vjphotography8553'; return false;">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <path fill="#fff" d="M22.54 6.42a2.78 2.78 0 00-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46a2.78 2.78 0 00-1.95 1.96A29 29 0 001 12a29 29 0 00.46 5.58A2.78 2.78 0 003.41 19.6C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 001.95-1.95A29 29 0 0023 12a29 29 0 00-.46-5.58z"/>
          <polygon fill="#ff0000" points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"/>
        </svg>
        Subscribe
      </a>
    </div>

  </div>

  <div class="robot-wrap">
    <div class="robot-box" id="robotBox" onclick="handleRobot()">
      <div class="checkbox" id="cb">
        <svg class="checkmark" width="13" height="10" viewBox="0 0 13 10" fill="none">
          <path d="M1 5l4 4 7-8" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="robot-label">I'm not a robot</span>
      <div class="recaptcha-logo">
        <svg class="rc-icon" viewBox="0 0 64 64" fill="none">
          <path d="M32 8C19 8 8 19 8 32s11 24 24 24 24-11 24-24S45 8 32 8z" stroke="#fff" stroke-width="2.5"/>
          <path d="M32 18v14l8 8" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <span>reCAPTCHA</span>
        <span>Privacy · Terms</span>
      </div>
    </div>
  </div>

  <div class="footer-note">© 2026 VJ Photography · All rights reserved</div>

  <script>
    function handleRobot() {
      const cb = document.getElementById('cb');
      if (cb.classList.contains('checked')) return;
      cb.classList.add('checked');
      setTimeout(function() {
        window.location.href = 'https://v.piufoto.com/r/7NzURf/'; 
      }, 600);
    }
  </script>

</body>
</html>
